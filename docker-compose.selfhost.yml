# Self-hosting Docker Compose — backend + frontend against an existing PostgreSQL.
#
# PostgreSQL runs in another stack (e.g. `afb-postgres` on
# `agents-for-business-backend_afb-network`). The backend container must not use
# `localhost` for Postgres — inside the container that points at itself. Compose
# builds DATABASE_URL from POSTGRES_* + POSTGRES_DOCKER_HOST (see below); keep
# DATABASE_URL in `.env` as `localhost` for host-native dev (`make server`) if you like.
#
# Usage:
#   cp .env.example .env
#   # Edit .env — POSTGRES_USER/PASSWORD/DB, JWT_SECRET; optional POSTGRES_DOCKER_HOST /
#   # POSTGRES_DOCKER_NETWORK if your Postgres container or network names differ.
#   docker compose -f docker-compose.selfhost.yml up -d
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8080 (also used by CLI/daemon)

name: multica

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - default
      - external_postgres
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/data/uploads
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@${POSTGRES_DOCKER_HOST:-afb-postgres}:5432/${POSTGRES_DB:-multica}?sslmode=${POSTGRES_SSLMODE:-disable}
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@multica.ai}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/callback}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-west-2}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      CLOUDFRONT_KEY_PAIR_ID: ${CLOUDFRONT_KEY_PAIR_ID:-}
      CLOUDFRONT_PRIVATE_KEY: ${CLOUDFRONT_PRIVATE_KEY:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      MULTICA_APP_URL: ${MULTICA_APP_URL:-http://localhost:3000}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REMOTE_API_URL: http://backend:8080
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      HOSTNAME: "0.0.0.0"

volumes:
  pgdata:
  backend_uploads:
